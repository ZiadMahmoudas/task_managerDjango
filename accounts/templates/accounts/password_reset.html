{% extends "base.html" %}

{% block title %}Reset Password — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">

        <h2 class="fw-bold mb-2">
          <i class="bi bi-lock me-2 text-warning"></i>Reset Password
        </h2>
        <p class="text-muted mb-4">
          Enter the email address associated with your account.
          We'll send you a link to reset your password.
        </p>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_email" class="form-label fw-semibold">Email Address</label>
            <input
              type="email"
              name="email"
              id="id_email"
              class="form-control"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-warning btn-lg">
              Send Reset Link
            </button>
          </div>
        </form>

        <div class="text-center small mt-3">
          <a href="{% url 'accounts:login' %}">← Back to Login</a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
