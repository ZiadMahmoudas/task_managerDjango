{% extends "base.html" %}

{% block title %}Password Changed — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 mt-4 text-center">
      <div class="card-body p-5">
        <i class="bi bi-check-circle-fill display-3 text-success mb-3"></i>
        <h2 class="fw-bold">Password Changed!</h2>
        <p class="text-muted">
          Your password has been successfully updated.
          You can now log in with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">
          Go to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
