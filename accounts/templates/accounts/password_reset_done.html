{% extends "base.html" %}

{% block title %}Check Your Email — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 mt-4 text-center">
      <div class="card-body p-5">
        <i class="bi bi-envelope-check display-3 text-success mb-3"></i>
        <h2 class="fw-bold">Email Sent!</h2>
        <p class="text-muted">
          If an account with that email exists, we've sent a password reset link.
          Check your inbox and follow the instructions.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary mt-2">
          Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
