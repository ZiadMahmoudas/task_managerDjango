{% extends "base.html" %}

{% block title %}Delete Task — TaskManager{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger border-0 shadow-sm">
      <div class="card-header bg-danger text-white py-3">
        <h4 class="mb-0 fw-bold">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirm Deletion
        </h4>
      </div>
      <div class="card-body p-4 text-center">

        <p class="fs-5 mb-1">Are you sure you want to delete:</p>
        <p class="fw-bold fs-4 text-danger mb-4">"{{ task.title }}"</p>
        <p class="text-muted small">This action cannot be undone.</p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-center gap-3 mt-3">
            <button type="submit" class="btn btn-danger btn-lg">
              <i class="bi bi-trash me-1"></i>Yes, Delete
            </button>
            <a href="{% url 'tasks:list' %}" class="btn btn-outline-secondary btn-lg">
              Cancel
            </a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>

{% endblock %}
